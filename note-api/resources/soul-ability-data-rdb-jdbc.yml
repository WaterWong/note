spring:
  datasource:
    dynamic:
      primary: note
      hikari:
        connection-timeout: 30000
        validation-timeout: 5000
        idle-timeout: 600000
        leak-detection-threshold: 0
        max-lifetime: 1800000
        max-pool-size: 10
        min-idle: 10
        initialization-fail-timeout: 1
        is-auto-commit: true
        is-read-only: false
        is-isolate-internal-queries: false
        is-register-mbeans: false
        is-allow-pool-suspension: false
      datasource:
        note:
          url: "jdbc:h2:~/note;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
#          url: "jdbc:h2:~/note;AUTO_SERVER=TRUE;OLD_INFORMATION_SCHEMA=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
          username: sa
          password: sa
          driver-class-name: org.h2.Driver
          type: com.zaxxer.hikari.HikariDataSource
          hikari:
            is-auto-commit: false