soul:
  ability:
    security:
      spring:
        web:
          #是否开启权限验证
          valid-permission: true
          urls:
            #安全的URL:通过Security过滤器
            security-urls:
              authenticated:
                - /**

            #忽略的URL:不会经过Security过滤器
            ignore-urls:
              - /ws/**
              - /favicon.ico
              - /images/favicon.ico
              - /v3/api-docs/**
              - /swagger-resources/**
              - /doc.html
              - /webjars/**
              - /actuator/**
              - /errors/**

            #忽略的URL:通过Security过滤器时忽略
            ignore-urls-in-security:

            #忽略的URL,会经过Security过滤器, 忽略CsrfFilter过滤器
            ignore-urls-in-csrf:
