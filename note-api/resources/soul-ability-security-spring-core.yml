    security:
      spring:
        mode: local                             #local: 本地单机模式; distributed: 分布式模
        session:
          creation-policy: STATELESS
          expired-url: "/passport/expired.html" #过期处理URL(forward)
          concurrency-control:
            enable: false
            max-sessions: 1
